[build]
  functions = "netlify/functions"

[functions."search"]
  timeout = 26

[functions."median"]
  timeout = 20

[functions."save-entry"]
  timeout = 15

[functions."get-history"]
  timeout = 10

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/median"
  to = "/.netlify/functions/median"
  status = 200

[[redirects]]
  from = "/api/save-entry"
  to = "/.netlify/functions/save-entry"
  status = 200

[[redirects]]
  from = "/api/get-history"
  to = "/.netlify/functions/get-history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
