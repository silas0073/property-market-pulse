name: Weekly Market Snapshot

on:
  schedule:
    # Every Monday 8am AEST (10pm Sunday UTC)
    - cron: '0 22 * * 0'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run scraper
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
        run: node .github/scripts/scrape.js

      - name: Commit data if changed
        run: |
          git config user.name "market-bot"
          git config user.email "bot@propcheckpost.netlify.app"
          git add data/history.json
          git diff --staged --quiet || git commit -m "auto: weekly snapshot $(date -u '+%Y-%m-%d')"
          git push
