name: Weekly Market Reminder

on:
  schedule:
    # Every Monday 8am AEST (Sunday 10pm UTC)
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send weekly reminder email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node .github/scripts/send-reminder.js
