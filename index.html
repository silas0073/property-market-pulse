  ${Dd}
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f0ede8;
    --bg-card:   #ffffff;
    --bg-header: #f5f3ef;
    --bg-metric: #ffffff;
    --bg-signal: #f5f3ef;
    --bg-input:  #ffffff;
    --bg-dark:   #e8e4de;
    --bg-darker: #dedad3;
    --border:    #ccc8be;
    --border-mid:#b8b4aa;
    --text:      #0d0d0d;
    --text-mid:  #2a2a2a;
    --text-dim:  #555550;
    --text-faint:#888880;
    --accent:    #a07800;
    --accent-bg: #fdf0c0;
    --green:     #155c38;
    --green-bg:  #d4f0e0;
    --red:       #991f15;
    --red-bg:    #fdd;
  }

  .wrap {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .card {
    background: var(--bg-card);
    border: none;
    border-bottom: 1px solid var(--border);
    width: 100%;
    overflow: hidden;
  }

  .header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px 18px;
  }

  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 16.8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .version {
    font-size: 10.8px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 2px;
  }

  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .control-label {
    font-size: 10.8px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .toggle-group { display: flex; gap: 4px; }

  .toggle-btn {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--text-dim); color: var(--text-mid); }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .toggle-btn.location-btn { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13.2px; padding: 7px 18px; }

  .sep { width: 1px; height: 22px; background: var(--border); }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .input-label {
    font-size: 10.8px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .num-input {
    background: var(--bg-input);
    border: 1px solid var(--border-mid);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 24px;
    padding: 8px 12px;
    border-radius: 2px;
    outline: none;
    width: 110px;
    letter-spacing: 0.05em;
    transition: border-color 0.2s;
    text-align: center;
  }
  .num-input:focus { border-color: var(--accent); }
  .num-input::placeholder { color: var(--text-faint); font-size: 16.8px; }
  .num-input.wide { width: 150px; }

  .calc-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13.2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    align-self: flex-end;
    height: 44px;
  }
  .calc-btn:hover { background: #b38a00; }
  .calc-btn:active { transform: scale(0.97); }
  .calc-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  .input-hint {
    font-size: 10.8px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    align-self: flex-end;
    padding-bottom: 12px;
  }

  .body { padding: 32px 40px; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .suburb-name {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 43.2px;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .period-label {
    font-size: 13.2px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  .filter-badge {
    font-size: 10.8px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-align: right;
    line-height: 2;
  }
  .filter-badge span { color: var(--accent); }

  .metrics {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .metric { background: var(--bg-metric); padding: 24px 20px; }

  .metric-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .metric-value {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 57.6px;
    line-height: 1;
    color: var(--text);
  }
  .metric-value.highlight { color: var(--accent); }
  .metric-value.sm { font-size: 43.2px; }
  .metric-value.green { color: var(--green); }

  .metric-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .sell-thru-bar { margin-bottom: 20px; }

  .bar-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .bar-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .bar-pct {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: var(--accent);
  }

  .bar-track {
    height: 7px;
    background: var(--bg-darker);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), #e6b800);
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .bar-zone {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .bar-zone span { font-size: 10.8px; color: var(--text-faint); letter-spacing: 0.08em; }

  .signal-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px;
    background: var(--bg-signal);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .signal-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .signal-dot.hot  { background: var(--green); box-shadow: 0 0 8px rgba(26,122,74,0.3); }
  .signal-dot.warm { background: var(--accent); box-shadow: 0 0 8px rgba(196,154,0,0.3); }
  .signal-dot.cold { background: var(--red); box-shadow: 0 0 8px rgba(192,57,43,0.3); }

  .signal-text { font-size: 18px; color: var(--text-mid); line-height: 1.5; }
  .signal-sub  { font-size: 13.2px; color: var(--text-dim); margin-top: 5px; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .source-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .source-label { font-size: 10.8px; color: var(--text-faint); letter-spacing: 0.08em; }

  .save-btn {
    font-family: 'Inter', sans-serif;
    font-size: 10.8px;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid rgba(26,122,74,0.3);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    transition: all 0.15s;
  }
  .save-btn:hover { background: rgba(26,122,74,0.15); border-color: var(--green); }

  .history-section {
    border-top: 1px solid var(--border);
    background: var(--bg-dark);
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 40px;
    cursor: pointer;
    user-select: none;
  }
  .history-header:hover { background: var(--bg-darker); }

  .history-toggle {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .history-table {
    padding: 0 40px 20px;
    overflow-x: auto;
  }

  .ht-head, .ht-row {
    display: grid;
    grid-template-columns: 110px 200px 120px 80px 80px 100px 100px 90px 28px;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .ht-head {
    color: var(--text-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border-mid);
    padding-bottom: 10px;
  }

  .ht-row { color: var(--text-mid); }
  .ht-row:last-child { border-bottom: none; }
  .ht-row:hover { background: var(--bg-darker); }

  .ht-date { color: var(--text-dim); line-height: 1.6; }
  .ht-num  { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16.8px; color: var(--text-mid); }
  .ht-num.green  { color: var(--green); }
  .ht-num.yellow { color: var(--accent); }
  .ht-num.red    { color: var(--red); }

  .ht-del {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 19.2px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .ht-del:hover { color: var(--red); }

  .placeholder {
    padding: 48px 40px; text-align: center;
    color: var(--text-faint); font-size: 14.4px;
    letter-spacing: 0.1em; line-height: 2;
  }
  .placeholder strong { color: var(--text-mid); display: block; margin-bottom: 8px; font-family: 'Inter', sans-serif; font-size: 18px; }

  .ref-section {
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    background: var(--bg-dark);
  }

  .ref-title {
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .ref-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ref-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .ref-location {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    white-space: nowrap;
    min-width: 140px;
    padding-top: 2px;
  }

  .ref-links {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }

  .ref-link {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 10.8px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .ref-link:hover { color: var(--text-mid); }
  .ref-link:hover .ref-url { color: var(--accent); }

  .ref-tag {
    color: var(--text-dim);
    font-size: 9.6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ref-tag.sale { border-color: rgba(196,154,0,0.3); color: var(--accent); background: var(--accent-bg); }
  .ref-tag.sold { border-color: rgba(26,122,74,0.3); color: var(--green); background: var(--green-bg); }

  .ref-url {
    color: var(--text-faint);
    font-size: 9.6px;
    word-break: break-all;
    line-height: 1.5;
    transition: color 0.15s;
  }

<script>
(function() {
  const TOKEN = 'pmp_history';
  const SAVE_URL = '/api/save-entry';
  const GET_URL  = '/api/get-history';

  // --- Load cloud history and merge into localStorage on startup ---
  function loadCloud() {
    fetch(GET_URL)
      .then(r => r.ok ? r.json() : [])
      .then(cloud => {
        if (!cloud.length) return;
        let local = [];
        try { local = JSON.parse(localStorage.getItem(TOKEN) || '[]'); } catch {}
        const localIds = new Set(local.map(e => e.id));
        const toAdd = cloud.filter(e => !localIds.has(e.id));
        if (toAdd.length) {
          const merged = [...local, ...toAdd].sort((a,b) => new Date(b.date+' '+b.time) - new Date(a.date+' '+a.time));
          localStorage.setItem(TOKEN, JSON.stringify(merged));
          console.log('[PMP Sync] Merged', toAdd.length, 'cloud entries');
        }
      })
      .catch(() => {});
  }

  // --- Watch localStorage for new saves and push to cloud ---
  let lastSnapshot = null;

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(TOKEN) || '[]'); } catch { return []; }
  }

  function syncNewEntries() {
    const current = getHistory();
    if (lastSnapshot === null) { lastSnapshot = current.map(e => e.id); return; }
    const knownIds = new Set(lastSnapshot);
    const newEntries = current.filter(e => !knownIds.has(e.id));
    if (newEntries.length) {
      lastSnapshot = current.map(e => e.id);
      for (const entry of newEntries) {
        fetch(SAVE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entry }),
        })
        .then(r => r.json())
        .then(d => console.log('[PMP Sync] Saved to cloud:', d))
        .catch(e => console.warn('[PMP Sync] Cloud save failed:', e.message));
      }
    }
  }

  // Init: load cloud first, then start watching
  loadCloud();
  setTimeout(() => {
    lastSnapshot = getHistory().map(e => e.id);
    setInterval(syncNewEntries, 1500);
  }, 3000);

})();
</script>
